<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Zakka Meet — Responsive Meeting Room</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-theme="dark">
  <div class="top-system-bar">
    <div class="system-title">
      <h1>Zakka Meet</h1>
      <span>Secure • Ultra Glass • Responsive</span>
    </div>
    <div class="system-stats">
      <div id="timerBadge" class="stat-badge">⏱️ Time: 00:00:00</div>
      <div id="walletBadge" class="stat-badge">💰 Wallet: $0.00</div>
    </div>
  </div>

  <main class="meeting-room">
    <aside class="panel panel-left" id="participantsPanel">
      <div class="panel-header">Participants <button class="panel-close" data-action="closeWindow" data-target="participantsPanel">✕</button></div>
      <div class="participants-list">
        <div class="participant">Host • You</div>
        <div class="participant">Guest 1</div>
        <div class="participant">Guest 2</div>
      </div>
    </aside>

    <section class="panel panel-center">
      <div class="main-video-wrap">
        <video id="meetingLocalVideoNode" autoplay muted playsinline></video>
        <video id="screenShareVideo" autoplay playsinline style="display:none"></video>
      </div>

      <div id="masterConferenceVideoGrid" class="video-grid">
        <div class="video-tile host" id="gridPanelHost">Host</div>
        <div class="video-tile guest" id="gridPanelGuest">Guest</div>
        <div class="video-tile mock" id="gridPanelManyMock1">User</div>
        <div class="video-tile mock" id="gridPanelManyMock2">User</div>
      </div>
    </section>

    <aside class="panel panel-right" id="chatPanel">
      <div class="panel-header">Chat <button class="panel-close" data-action="closeWindow" data-target="textMeetingWin">✕</button></div>
      <div class="chat-stream" id="textMeetingBox"></div>
      <div class="chat-input">
        <input id="textMeetingInputField" placeholder="Type a message" />
        <button class="send" data-action="triggerTextNetworkBroadcast">Send</button>
      </div>
    </aside>
  </main>

  <div class="bottom-dock-bar meeting-controls" role="toolbar" aria-label="Meeting controls">
    <button id="muteBtn" class="control-btn" data-action="toggleZakkaMeetMicrophone">🎙️</button>
    <button id="camBtn" class="control-btn" data-action="toggleStandaloneCameraDriver">📹</button>
    <button id="shareBtn" class="control-btn" data-action="executeRealScreenShare">🖥️</button>
    <button id="raiseHandBtn" class="control-btn" data-action="raiseHand">✋</button>
    <button id="chatToggleBtn" class="control-btn" data-action="openChatPanel">💬</button>
    <button id="participantsToggleBtn" class="control-btn" data-action="openParticipantsPanel">👥</button>
    <button id="endCallBtn" class="control-btn danger" data-action="closeGlobalMeetingCallSession">🔴 End</button>
  </div>

  <!-- Lightweight welcome and modals used by app.js openWindow/closeWindow -->
  <div id="welcomeWin" class="app-window" role="dialog" aria-hidden="true">
    <div class="window-header">
      <div class="window-title">Welcome</div>
      <div class="window-controls"><button data-action="closeWindow" data-target="welcomeWin">Close</button></div>
    </div>
    <div class="window-body">Welcome to Zakka Meet — your meeting layout is now responsive.</div>
  </div>

  <script src="app.js" defer></script>
</body>
</html>
